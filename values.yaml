replicaCount: 1

image:
  repository: n8nio/n8n
  tag: nightly
  pullPolicy: IfNotPresent

service:

  type: NodePort
  port: 5678

n8n:
  encryptionKey: "4aONK7FNR0HNKZI1FH5znM12gz5iCxQA"

ingress:
  enabled: true
  className: nginx
  annotations:
    cert-manager.io/cluster-issuer: "letsencrypt-dns01"
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
  hosts:
    - host: n8n.tarchunk.win
      paths:
        - path: /
          pathType: Prefix
  tls:
    - secretName: n8n-tls
      hosts:
        - n8n.tarchunk.win

persistence:
  enabled: true
  storageClassName: "hostpath-storage"   # ใส่ storage class ที่ cluster คุณมี เช่น "local-path" หรือ "longhorn"
  accessModes:
    - ReadWriteOnce
  size: 5Gi
  existingClaim: ""      # ถ้ามี PVC อยู่แล้วใส่ชื่อ claim ได้เลย

resources: {}
