apiVersion: v1
kind: ConfigMap
metadata:
  name: n8n-runner-config
data:
  n8n-task-runners.json: |
    {
      "task-runners": [
        {
          "runner-type": "javascript",
          "workdir": "/home/runner",
          "health-check-server-port": "5580",
          "command": "/usr/local/bin/node",
          "args": [
            "--disallow-code-generation-from-strings",
            "--disable-proto=delete",
            "/opt/runners/task-runner-javascript/dist/start.js"
          ],
          "allowed-env": [
            "N8N_RUNNERS_AUTO_SHUTDOWN_TIMEOUT",
            "N8N_RUNNERS_TASK_TIMEOUT"
          ],
          "env-overrides": {
            "NODE_FUNCTION_ALLOW_EXTERNAL": "ccxt"
          }
        },
        {
          "runner-type": "python",
          "workdir": "/home/runner",
          "command": "/opt/runners/task-runner-python/.venv/bin/python",
          "args": [
                "-m",
                "src.main"
          ],
          "health-check-server-port": "5681",
          "allowed-env": [
            "N8N_RUNNERS_AUTO_SHUTDOWN_TIMEOUT",
            "N8N_RUNNERS_TASK_TIMEOUT",
            "N8N_RUNNERS_GRANT_TOKEN",
            "N8N_RUNNERS_EXTERNAL_ALLOW",
            "N8N_RUNNERS_STDLIB_ALLOW",
            "PYTHONPATH"
          ],
          "env-overrides": {
            "PYTHONPATH": "/opt/runners/task-runner-python/.venv/lib/python3.13/site-packages",
            "N8N_RUNNERS_STDLIB_ALLOW": "json,sys,builtins",
            "N8N_RUNNERS_EXTERNAL_ALLOW": "numpy,pandas,talib,PIL"
          }
        }
      ]
    }
