apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "n8n.fullname" . }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app: {{ include "n8n.name" . }}
  template:
    metadata:
      labels:
        app: {{ include "n8n.name" . }}
    spec:
      containers:
        - name: n8n
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          args: ["start"]
          ports:
            - containerPort: 5678
          env:
            - name: N8N_PORT
              value: "5678"
            - name: N8N_HOST
              # value: "0.0.0.0"
              value: "{{ (index .Values.ingress.hosts 0).host }}"
            - name: WEBHOOK_URL
              value: "https://{{ (index .Values.ingress.hosts 0).host }}/"
            - name: N8N_ENCRYPTION_KEY
              value: "{{ .Values.n8n.encryptionKey }}"
            - name: N8N_ENFORCE_SETTINGS_FILE_PERMISSIONS
              value: "false"
            - name: DB_TYPE
              value: "postgresdb"
            - name: N8N_PROTOCOL
              value: "https"
            - name: DB_POSTGRESDB_HOST
              value: "192.168.1.44"
            - name: DB_POSTGRESDB_PORT
              value: "5432"
            - name: DB_POSTGRESDB_DATABASE
              value: "n8n_db"
            - name: DB_POSTGRESDB_USER
              value: "n8n"
            - name: DB_POSTGRESDB_PASSWORD
              value: "4aONK7FNR0HNKZI1FH5znM12gz5iCxQA"
          volumeMounts:
            - name: n8n-data
              mountPath: /home/node/.n8n
          securityContext:
            runAsUser: 1000
            runAsGroup: 1000
            fsGroup: 1000 
      volumes:
        - name: n8n-data
          persistentVolumeClaim:
            claimName: {{ if .Values.persistence.existingClaim }}{{ .Values.persistence.existingClaim }}{{ else }}{{ include "n8n.fullname" . }}{{ end }}
